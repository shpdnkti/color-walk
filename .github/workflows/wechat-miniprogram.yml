name: WeChat Miniprogram

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run preview or upload"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - upload
      version:
        description: "Miniprogram version for upload"
        required: false
        default: "0.1.0"
      description:
        description: "Release description"
        required: false
        default: "Color Walk miniprogram release"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - run: npm run miniprogram:validate

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    env:
      WECHAT_MINIPROGRAM_APPID: ${{ secrets.WECHAT_MINIPROGRAM_APPID }}
      WECHAT_MINIPROGRAM_PRIVATE_KEY: ${{ secrets.WECHAT_MINIPROGRAM_PRIVATE_KEY }}
      WECHAT_MINIPROGRAM_API_BASE_URL: ${{ secrets.WECHAT_MINIPROGRAM_API_BASE_URL }}
      WECHAT_MINIPROGRAM_VERSION: ${{ inputs.version }}
      WECHAT_MINIPROGRAM_DESC: ${{ inputs.description }}
    steps:
      - name: Check WeChat publish configuration
        run: |
          missing=0
          for name in WECHAT_MINIPROGRAM_APPID WECHAT_MINIPROGRAM_PRIVATE_KEY WECHAT_MINIPROGRAM_API_BASE_URL; do
            if [ -z "${!name}" ]; then
              echo "$name is required for miniprogram preview/upload."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install --no-save miniprogram-ci@2.1.31
      - run: npm run miniprogram:${{ inputs.mode }}
