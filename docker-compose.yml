name: color-walk

services:
  app:
    build: .
    image: color-walk-collage:local
    env_file:
      - .env.local
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
