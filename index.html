<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Color Walk 拼贴编辑器</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app-shell editor-shell">
      <header class="editor-header" aria-label="编辑器操作栏">
        <button class="header-button secondary-action" id="resetButton" type="button"><span class="icon icon-upload" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 5v10"/><path d="m8 9 4-4 4 4"/><path d="M5 17v2h14v-2"/></svg></span><span>重新上传</span></button>
        <div class="editor-brand" aria-label="Color Walk">
          <h1>Color Walk</h1>
        </div>
        <div class="header-actions">
          <button class="header-button stash-action" id="stashButton" type="button"><span class="icon icon-save" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 4h12l2 2v14H5z"/><path d="M8 4v6h8"/><path d="M8 17h8"/></svg></span><span>暂存</span></button>
          <button class="header-button primary-action" id="exportButton" type="button"><span class="icon icon-export" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 4v10"/><path d="m8 10 4 4 4-4"/><path d="M5 20h14"/></svg></span><span>导出图片</span></button>
        </div>
      </header>

      <section id="canvasStage" class="canvas-stage" aria-label="实时画布区">
        <div class="stage-meta" aria-live="polite">
          <span id="photoCount">0 张</span>
          <span id="layoutHint">纯九宫格</span>
        </div>

        <div id="canvasViewport" class="canvas-viewport" aria-label="可缩放画布视口">
          <div id="canvasTransform" class="canvas-transform">
            <div id="previewCanvas" class="poster-card collage-preview layout-grid9 font-system"></div>
          </div>
        </div>

        <div class="canvas-zoom-toolbar" aria-label="画布缩放工具栏">
          <button id="zoomOutButton" class="zoom-button" type="button" aria-label="缩小画布">−</button>
          <button id="zoomLevelButton" class="zoom-level-button" type="button" aria-label="重置为 100%">100%</button>
          <button id="zoomInButton" class="zoom-button" type="button" aria-label="放大画布">+</button>
          <button id="zoomFitButton" class="zoom-fit-button" type="button">自适应</button>
        </div>

        <div class="stage-actions">
          <label class="upload-button" for="fileInput">选择图片</label>
          <p id="exportStatus" class="status-text" role="status"></p>
        </div>
      </section>

      <section id="bottomPanel" class="bottom-panel control-panel" aria-label="操作面板">
        <div id="controlPanel" class="control-panel-body">
          <div id="panelTabBar" class="panel-tabbar" role="tablist" aria-label="编辑标签"></div>
          <div id="panelContent" class="panel-content">
            <section class="panel-page" data-panel="layout" aria-label="布局设置">
              <div class="panel-title">
                <h2>拼贴结构</h2>
                <span>5 模板</span>
              </div>
              <div id="layoutControls" class="layout-rail" role="listbox" aria-label="拼贴布局"></div>
            </section>

            <section class="panel-page" data-panel="palette" aria-label="色盘设置">
              <div class="panel-title">
                <h2>整组色盘</h2>
                <span id="averageColor">等待图片</span>
              </div>
              <div id="paletteStrip" class="palette-strip"></div>
              <label id="customColorButton" class="custom-color-button" for="customColorInput"><span class="icon icon-picker" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m14 5 5 5"/><path d="M13 6l5 5-8 8H5v-5z"/><path d="M5 19h5"/></svg></span><span>自定义吸色</span></label>
              <input id="customColorInput" class="visually-hidden" type="color" value="#2a4252" />
              <div id="photoGrid" class="photo-grid empty-state">
                <p>上传 1 到 9 张照片后，这里会显示主色调和 EXIF 信息。</p>
              </div>
            </section>

            <section class="panel-page" data-panel="copy" aria-label="Color Walk 文字设置">
              <div class="panel-title">
                <h2>封面文字</h2>
                <button id="copyGenerateButton" class="text-button" type="button">生成封面文字</button>
              </div>
              <div class="copy-controls">
                <label>
                  文字
                  <textarea id="coverTextInput" rows="5" placeholder="上传图片后自动生成封面文字，也可以直接手动填写"></textarea>
                </label>
                <div class="field-grid typography-fields">
                  <label>
                    字号
                    <input id="fontSizeInput" type="range" min="16" max="30" value="24" />
                  </label>
                  <label>
                    字体
                    <select id="fontSelect">
                      <option value="system" selected>细黑体</option>
                      <option value="serif">细宋体</option>
                      <option value="hand">手写体</option>
                      <option value="casual">Casual Handwriting</option>
                    </select>
                  </label>
                </div>
                <button id="copyTextButton" class="floating-copy-button" type="button"><span class="icon icon-copy" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 9h10v10H9z"/><path d="M5 15V5h10"/></svg></span><span>复制文字</span></button>
              </div>
            </section>

            <section class="panel-page" data-panel="style" aria-label="样式设置">
              <div class="panel-title">
                <h2>画布样式</h2>
                <span>实时预览</span>
              </div>
              <div class="style-controls">
                <div class="ratio-presets-control">
                  <div class="ratio-control-header">
                    <span>画布比例</span>
                    <span id="ratioResolution">3:4 (1080x1440)</span>
                  </div>
                  <div id="ratioPresetBar" class="ratio-preset-bar" role="group" aria-label="画布输出比例">
                    <button class="ratio-preset active" type="button" data-ratio="3:4">3:4</button>
                    <button class="ratio-preset" type="button" data-ratio="4:5">4:5</button>
                    <button class="ratio-preset" type="button" data-ratio="9:16">9:16</button>
                    <button class="ratio-preset" type="button" data-ratio="2:3">2:3</button>
                    <button class="ratio-preset" type="button" data-ratio="1:2">1:2</button>
                  </div>
                </div>
                <div class="ratio-control">
                  <div class="ratio-control-header">
                    <label for="ratioInput">色块比例</label>
                    <button id="equalRatioButton" class="equal-ratio-button" type="button">等大</button>
                  </div>
                  <input id="ratioInput" type="range" min="35" max="65" value="50" />
                </div>
                <label class="toggle-field">
                  <span>边距切换 Border-less</span>
                  <input id="borderlessInput" type="checkbox" checked />
                </label>
                <label>
                  圆角
                  <input id="radiusInput" type="range" min="0" max="32" value="0" />
                </label>
                <label>
                  留白
                  <input id="paddingInput" type="range" min="0" max="28" value="0" />
                </label>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <input id="fileInput" class="visually-hidden" type="file" accept="image/*" multiple />
    <canvas id="workCanvas" class="visually-hidden"></canvas>
    <canvas id="exportCanvas" class="visually-hidden" width="1080" height="1350"></canvas>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
