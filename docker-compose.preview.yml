name: color-walk-preview

services:
  preview:
    image: nginx:stable-alpine
    ports:
      - "${PREVIEW_PORT:-5173}:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./src:/usr/share/nginx/html/src:ro
      - ./node_modules/heic-to/dist/next:/usr/share/nginx/html/vendor/heic-to:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.preview.conf:/etc/nginx/nginx.conf:ro
