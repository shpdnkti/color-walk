name: color-walk-preview

services:
  preview:
    image: node:22-alpine
    working_dir: /app
    env_file:
      - .env.local
    ports:
      - "${PREVIEW_PORT:-5173}:8080"
    volumes:
      - ./package.json:/app/package.json:ro
      - ./server.js:/app/server.js:ro
      - ./index.html:/app/index.html:ro
      - ./src:/app/src:ro
    command: npm start
