name: color-walk

services:
  app:
    build: .
    image: color-walk-collage:local
    ports:
      - "${APP_PORT:-8080}:3000"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_VISION_MODEL: "${OPENAI_VISION_MODEL:-gpt-5.5}"
      OPENAI_REQUEST_TIMEOUT_MS: "${OPENAI_REQUEST_TIMEOUT_MS:-90000}"
      GEOCODE_REVERSE_URL: "${GEOCODE_REVERSE_URL:-https://nominatim.openstreetmap.org/reverse}"
      GEOCODE_USER_AGENT: "${GEOCODE_USER_AGENT:-ColorWalk/0.1 (https://github.com/shpdnkti/color-walk)}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
